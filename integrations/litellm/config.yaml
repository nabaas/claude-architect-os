# LiteLLM Proxy Configuration — Claude Architect OS
# Runs at localhost:4000 — unified model routing endpoint
# Start: litellm --config integrations/litellm/config.yaml --port 4000

model_list:
  # Claude Models (via Anthropic)
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-fast
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # Ollama (Local — Zero Cost)
  - model_name: hermes3
    litellm_params:
      model: ollama/hermes3
      api_base: http://localhost:11434

  - model_name: gemma3-4b
    litellm_params:
      model: ollama/gemma3:4b
      api_base: http://localhost:11434

  - model_name: nomic-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://localhost:11434

  # OpenRouter fallback
  - model_name: gpt-4o
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

router_settings:
  routing_strategy: latency-based-routing
  fallbacks:
    - { "claude-sonnet-4-6": ["claude-haiku-fast", "hermes3"] }
    - { "claude-opus-4-7": ["claude-sonnet-4-6"] }
    - { "hermes3": ["gemma3-4b"] }
  num_retries: 3
  timeout: 120

  # Route by task type (custom header: x-task-type)
  routing_rules:
    - { "if": "task_type == 'coding'", "use": "claude-sonnet-4-6" }
    - { "if": "task_type == 'fast'", "use": "hermes3" }
    - { "if": "task_type == 'research'", "use": "claude-opus-4-7" }
    - { "if": "task_type == 'local'", "use": "gemma3-4b" }
    - { "if": "task_type == 'embed'", "use": "nomic-embed" }

litellm_settings:
  drop_params: true
  max_budget: 10.0
  budget_duration: 1d
  callbacks: ["langfuse"]
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
